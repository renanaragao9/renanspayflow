<div class="min-h-screen bg-gray-50 dark:bg-gray-900">
  <nav class="bg-white border-b border-gray-200 dark:bg-gray-800 dark:border-gray-700 fixed w-full top-0 z-50">
    <div class="max-w-xl mx-auto px-4 sm:px-6 flex items-center justify-between h-16">

        <a routerLink="/dashboard" class="flex items-center gap-2">
        <span class="text-xl font-bold text-blue-600 dark:text-blue-400">PayFlow</span>
      </a>

      <div class="hidden md:flex items-center gap-1">
        <a
          routerLink="/dashboard"
          routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors"
        >
          Dashboard
        </a>
        <a
          routerLink="/cost-centers"
          routerLinkActive="bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400"
          class="px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors"
        >
          Centros de Custo
        </a>
      </div>

      <div class="flex items-center gap-3">
        @if (currentUser()) {
          <span class="hidden sm:block text-sm text-gray-600 dark:text-gray-300">
            Olá, <strong>{{ currentUser()!.name }}</strong>
          </span>
        }
        <button
          type="button"
          (click)="logout()"
          class="flex items-center gap-1.5 text-sm font-medium text-gray-600 hover:text-red-600 dark:text-gray-300 dark:hover:text-red-400 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
          </svg>
          Sair
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <router-outlet />
    </div>
  </main>

</div>
